name: Sync Oyster Menu from Toast

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes
  workflow_dispatch:           # Allow manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Needed to commit oysters.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Toast sync script
        env:
          TOAST_CLIENT_ID: ${{ secrets.TOAST_CLIENT_ID }}
          TOAST_CLIENT_SECRET: ${{ secrets.TOAST_CLIENT_SECRET }}
          TOAST_RESTAURANT_GUID: ${{ secrets.TOAST_RESTAURANT_GUID }}
        run: node sync.js

      - name: Commit updated oysters.json (if changed)
        run: |
          git config user.name "Oyster Sync Bot"
          git config user.email "bot@halfshellcharlotte.com"
          git add public/oysters.json sync-state.json
          git diff --staged --quiet || git commit -m "chore: sync oyster availability [skip ci]"
          git push
