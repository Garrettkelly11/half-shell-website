<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Half Shell Raw Bar — Log in or sign up to access your account." />
  <title>Half Shell — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=Roboto+Mono:wght@400;700&family=Montserrat:ital,wght@0,300;0,400;0,600;1,400&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=Roboto+Mono:wght@400;700&family=Montserrat:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet"></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Playfair Display', Georgia, serif;
      background: #0e2d3a;
      color: #0e2d3a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: #f3f8f6;
      border-radius: 6px;
      padding: 2.5rem 2rem;
      width: 380px;
      max-width: 92vw;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }

    .login-logo {
      height: 72px;
      width: auto;
      margin-bottom: 1rem;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    }

    .login-eyebrow {
      font-family: 'Lato', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #e89438;
      margin-bottom: 0.4rem;
    }

    .login-container h2 {
      font-size: 1.5rem;
      font-weight: 400;
      color: #0e2d3a;
      margin-bottom: 1.5rem;
    }

    .login-container label {
      display: block;
      font-family: 'Lato', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6a8f9a;
      margin-bottom: 0.4rem;
      text-align: left;
    }

    .login-container input[type="tel"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #9ec4bc;
      border-radius: 4px;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      color: #0e2d3a;
      background: #fff;
      outline: none;
      margin-bottom: 1.25rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .login-container input[type="tel"]:focus {
      border-color: #e89438;
      box-shadow: 0 0 0 2px rgba(232,148,56,0.18);
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .btn-primary {
      width: 100%;
      padding: 0.65rem 1rem;
      background: #0e2d3a;
      color: #f5f0e8;
      border: none;
      border-radius: 4px;
      font-family: 'Lato', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #1a4a5a; }

    .btn-secondary {
      width: 100%;
      padding: 0.65rem 1rem;
      background: transparent;
      color: #0e2d3a;
      border: 1.5px solid #9ec4bc;
      border-radius: 4px;
      font-family: 'Lato', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-secondary:hover {
      background: #e8f2ef;
      border-color: #2a7f94;
      color: #2a7f94;
    }

    .btn-employee {
      width: 100%;
      padding: 0.65rem 1rem;
      background: transparent;
      color: #6a8f9a;
      border: 1.5px solid #bcd4ce;
      border-radius: 4px;
      font-family: 'Lato', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-decoration: none;
      display: block;
      text-align: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      margin-top: 0.5rem;
    }
    .btn-employee:hover {
      background: #0e2d3a;
      border-color: #0e2d3a;
      color: #e89438;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 0.25rem 0;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #bcd4ce;
    }
    .divider span {
      font-family: 'Lato', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #9ec4bc;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: 'Lato', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6a8f9a;
      text-decoration: none;
      margin-top: 1.25rem;
      cursor: pointer;
      transition: color 0.15s;
    }
    .back-link:hover { color: #e89438; }

    @media (max-width: 400px) {
      .login-container { padding: 2rem 1.25rem; }
    }
  </style>
</head>
<body>

<div class="login-container">
  <img src="assets/logo.png" alt="Half Shell Raw Bar" class="login-logo" width="72" height="72" />
  <div class="login-eyebrow">Half Shell Raw Bar</div>
  <h2>Welcome</h2>

  <label for="phone-number">Phone Number</label>
  <input type="tel" id="phone-number" placeholder="(555) 123-4567" autocomplete="tel" />

  <div class="btn-group">
    <button class="btn-primary" id="login-btn">Log In</button>
    <button class="btn-secondary" id="signup-btn">Sign Up</button>
  </div>

  <div class="divider"><span>or</span></div>

  <a class="btn-employee" href="employee.html">Employee Login</a>

  <a class="back-link" href="javascript:history.back()">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9,2 4,7 9,12"/>
    </svg>
    Back to Menu
  </a>
</div>

</body>
</html>
