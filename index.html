<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Half Shell Raw Bar's nightly oyster menu — fresh selections sourced from both coasts, with flavor profiles and pricing." />
  <title>Half Shell — On the Half Shell Tonight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="image" href="assets/hero-slide-1.jpg" />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=Roboto+Mono:wght@400;700&family=Montserrat:ital,wght@0,300;0,400;0,600;1,400&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=Roboto+Mono:wght@400;700&family=Montserrat:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet"></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Playfair Display', Georgia, serif;
      background: #f3f8f6;
      color: #0e2d3a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      position: relative;
      background: url('assets/hero-slide-1.jpg') center / cover no-repeat;
      color: #f5f0e8;
      padding: 2rem 2.5rem 1.75rem;
      border-bottom: 3px solid #e89438;
      text-align: center;
    }
    .hero-login-link {
      position: absolute;
      top: 0.85rem;
      right: 1rem;
      z-index: 10;
      background: rgba(14, 45, 58, 0.55);
      border: 1px solid rgba(232, 148, 56, 0.35);
      border-radius: 4px;
      padding: 0.45rem 0.55rem;
      color: #f5f0e8;
      cursor: pointer;
      display: flex;
      align-items: center;
      text-decoration: none;
      transition: background 0.15s;
    }
    .hero-login-link:hover { background: rgba(14, 45, 58, 0.88); }
    .hero-login-link svg { display: block; }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(10, 28, 38, 0.68);
    }
    header > * { position: relative; z-index: 1; }
    .header-logo {
      height: 80px;
      width: auto;
      margin-bottom: 1rem;
      filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    header h1 {
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      line-height: 1.2;
    }
    header p {
      font-size: 0.9rem;
      color: #c8dfe5;
      margin-top: 0.4rem;
      font-style: italic;
    }

    /* ── Main ── */
    main {
      flex: 1;
      padding: 2.5rem 2rem;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.75rem;
      padding-bottom: 0.6rem;
      border-bottom: 2px solid #e89438;
    }
    .section-header h2 {
      font-size: 1.3rem;
      font-weight: 400;
      letter-spacing: 0.02em;
    }
    .serving-count {
      font-family: 'Lato', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #3d7080;
    }

    /* ── Card grid ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .oyster-card {
      background: #fff;
      border: 1px solid #bcd4ce;
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .oyster-card:hover {
      box-shadow: 0 4px 20px rgba(14,45,58,0.12);
      transform: translateY(-2px);
    }

    .card-photo {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }
    .card-photo-placeholder {
      width: 100%;
      height: 120px;
      background: linear-gradient(135deg, #112f3d 0%, #1a4a5a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2a7f94;
      font-size: 2.5rem;
    }

    .card-head {
      background: #0e2d3a;
      padding: 1rem 1.25rem 0.9rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .card-head-text { flex: 1; }
    .card-price {
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: #e89438;
      white-space: nowrap;
      padding-top: 0.2rem;
    }
    .card-name {
      font-family: 'Roboto Mono', monospace;
      font-size: 1.3rem;
      font-weight: 400;
      color: #f5f0e8;
      letter-spacing: 0.02em;
      margin-bottom: 0.3rem;
    }
    .card-origin {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      color: #8ab4be;
      line-height: 1.4;
    }

    /* Salinity strip */
    .card-salinity {
      background: #112f3d;
      padding: 0.55rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .sal-label {
      font-family: 'Lato', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #e89438;
      flex-shrink: 0;
      cursor: default;
    }
    .sal-tooltip {
      position: fixed;
      width: 200px;
      background: #0e2d3a;
      color: #d6eaee;
      font-family: 'Lato', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      line-height: 1.5;
      padding: 0.6rem 0.75rem;
      border-radius: 4px;
      border: 1px solid #e89438;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
      pointer-events: none;
      white-space: pre-line;
      z-index: 999;
      display: none;
    }
    .sal-dots { display: flex; gap: 4px; flex-shrink: 0; }
    .sal-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
    }
    .sal-dots span.filled { background: #e89438; }
    .sal-text {
      font-family: 'Lato', sans-serif;
      font-size: 0.72rem;
      color: #a8c8d0;
    }

    /* Card body */
    .card-body {
      padding: 1.1rem 1.25rem 1.25rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }
    .card-tasting {
      font-family: 'Montserrat', sans-serif;
      font-style: italic;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #1a3a45;
      flex: 1;
    }
    .card-tasting::before { content: '\201C'; color: #e89438; }
    .card-tasting::after  { content: '\201D'; color: #e89438; }

    .card-link {
      display: inline-block;
      font-family: 'Lato', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #2a7f94;
      text-decoration: none;
      border-bottom: 1px solid #bcd4ce;
      padding-bottom: 1px;
      transition: color 0.15s, border-color 0.15s;
      align-self: flex-start;
    }
    .card-link:hover { color: #e89438; border-color: #e89438; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #6a8f9a;
    }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
    .empty-state h3 {
      font-size: 1.4rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
      color: #0e2d3a;
    }
    .empty-state p { font-style: italic; font-size: 0.9rem; }

    /* ── Footer ── */
    footer {
      background: #0e2d3a;
      border-top: 1px solid #1a4a5a;
      padding: 1.25rem 2rem;
      text-align: center;
    }
    footer a {
      font-family: 'Lato', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #7fb3c0;
      text-decoration: none;
      transition: color 0.15s;
    }
    footer a:hover { color: #e89438; }
    .sep { color: #1a4a5a; margin: 0 0.75rem; }

    /* ── Page nav bar ── */
    .page-nav {
      background: #112f3d;
      border-bottom: 1px solid #1a4a5a;
      padding: 0 2rem;
      display: flex;
      gap: 0;
    }
    .page-nav a {
      font-family: 'Lato', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #7fb3c0;
      text-decoration: none;
      padding: 0.65rem 1rem;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .page-nav a:hover { color: #f5f0e8; }
    .page-nav a.active { color: #e89438; border-bottom-color: #e89438; }

    /* Login link in nav */
    .nav-login-link {
      margin-left: auto;
      display: flex;
      align-items: center;
      padding: 0.55rem 0.75rem;
      color: #6a8f9a;
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-login-link:hover { color: #f5f0e8; }

    /* ── Sort control ── */
    .sort-wrap { position: relative; margin-left: auto; flex-shrink: 0; }
    .sort-btn {
      background: none;
      border: 1px solid #bcd4ce;
      border-radius: 4px;
      padding: 0.28rem 0.55rem;
      color: #3d7080;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: 'Lato', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .sort-btn:hover { background: #e8f2ef; border-color: #9ec4bc; color: #0e2d3a; }
    .sort-btn.active { border-color: #e89438; color: #e89438; }
    .sort-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 5px);
      right: 0;
      background: #fff;
      border: 1px solid #bcd4ce;
      border-radius: 4px;
      min-width: 182px;
      z-index: 50;
      box-shadow: 0 4px 18px rgba(14,45,58,0.13);
      overflow: hidden;
    }
    .sort-dropdown.open { display: block; }
    .sort-option {
      display: block;
      width: 100%;
      text-align: left;
      font-family: 'Lato', sans-serif;
      font-size: 0.76rem;
      font-weight: 400;
      color: #1a3a45;
      background: none;
      border: none;
      border-bottom: 1px solid #e8f2ef;
      padding: 0.6rem 0.9rem;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .sort-option:last-child { border-bottom: none; }
    .sort-option:hover { background: #f3f8f6; color: #e89438; }
    .sort-option.active { color: #e89438; font-weight: 700; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      header { padding: 1.5rem 1.25rem 1.25rem; }
      header h1 { font-size: 1.7rem; }
      .header-logo { height: 60px; }
      main { padding: 1.5rem 1rem; }
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <img src="assets/logo.png" alt="Half Shell Raw Bar" class="header-logo" width="80" height="80" />
  <h1>On the Half Shell Tonight</h1>
  <p>Fresh selections, sourced from both coasts</p>
  <a class="hero-login-link" href="user.html" aria-label="Login">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
  </a>
</header>

<nav class="page-nav">
  <a href="index.html" class="active">Tonight's Menu</a>
  <a href="Oyster%20Overview.html">Oyster Library</a>
</nav>

<main>
  <div class="section-header">
    <h2>Tonight's Oysters</h2>
    <span class="serving-count" id="count-label"></span>
    <div class="sort-wrap">
      <button class="sort-btn" id="sort-btn" aria-label="Sort oysters">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="6" y1="4" x2="6" y2="17"/>
          <polyline points="3,14 6,18 9,14"/>
          <line x1="12" y1="6" x2="21" y2="6"/>
          <line x1="12" y1="11" x2="19" y2="11"/>
          <line x1="12" y1="16" x2="16" y2="16"/>
          <line x1="12" y1="21" x2="14" y2="21"/>
        </svg>
        Sort
      </button>
      <div class="sort-dropdown" id="sort-dropdown">
        <button class="sort-option active" data-sort="az">Alphabetical (A–Z)</button>
        <button class="sort-option" data-sort="za">Alphabetical (Z–A)</button>
        <button class="sort-option" data-sort="salinity">Salinity</button>
        <button class="sort-option" data-sort="size">Size</button>
      </div>
    </div>
  </div>
  <div id="card-grid" class="card-grid"></div>
  <div id="empty-state" class="empty-state" style="display:none">
    <div class="empty-icon">🦪</div>
    <h3>Nothing on the menu yet</h3>
    <p>Check back soon — the selection changes daily.</p>
  </div>
</main>

<footer>
  <a href="index.html">Tonight's Menu</a>
  <span class="sep">|</span>
  <a href="Oyster%20Overview.html">Oyster Library</a>
  <span class="sep">|</span>
  <a href="employee.html">Employee Portal</a>
</footer>

<script src="data/oysters.js"></script>
<script>
// OYSTERS catalog is loaded from data/oysters.js as a global `var`.
// Edit data/oysters.js to change the catalog; this file just consumes it.

// Photo lookup — maps oyster id to actual asset filename (handles mixed extensions).
const PHOTO_MAP = {
  'barstool': 'assets/oysters/barstool.jpg',
  'beach-plum': 'assets/oysters/beach-plum.webp',
  'bear-tide': 'assets/oysters/bear-tide.jpg',
  'beau-soleil': 'assets/oysters/Beau-soleil.jpg',
  'blackberry': 'assets/oysters/blackberry.webp',
  'blue-point-ct': 'assets/oysters/blue-point-ct.jpg',
  'boomamoto': 'assets/oysters/boomamoto.jpeg',
  'breakwater': 'assets/oysters/breakwater.png',
  'carolina-envy': 'assets/oysters/carolina-envy.png',
  'carolina-gold': 'assets/oysters/carolina-gold.png',
  'divine-pines': 'assets/oysters/divine-pines.png',
  'fat-bastard': 'assets/oysters/fat-bastard.jpg',
  'french-kiss': 'assets/oysters/french-kiss.jpg',
  'great-white': 'assets/oysters/great-white.webp',
  'hammerheads': 'assets/oysters/hammerheads.webp',
  'hearts-desire': 'assets/oysters/hearts-desire.JPG',
  'irish-point': 'assets/oysters/irish-point.webp',
  'james-river': 'assets/oysters/james-river.jpg',
  'jimmy-fund-gold': 'assets/oysters/jimmy-fund-gold.jpg',
  'kumamoto': 'assets/oysters/kumamoto.jpg',
  'le-petite-barachois': 'assets/oysters/le-petite-barachois.jpg',
  'love-shuck': 'assets/oysters/love-shuck.png',
  'malpeque': 'assets/oysters/Malpeque.jpg',
  'mama-mia': 'assets/oysters/mama-mia.jpg',
  'masonboro-pearl': 'assets/oysters/masonboro-pearl.jpg',
  'mookiemoto': 'assets/oysters/mookiemoto.webp',
  'moondancer': 'assets/oysters/moondancer.jpg',
  'moonrise': 'assets/oysters/moonrise.jpg',
  'nc-ikigai': 'assets/oysters/nc-ikigai.png',
  'olde-salt': 'assets/oysters/olde-salt.jpg',
  'olympic-view': 'assets/oysters/olympic-view.png',
  'pink-moon': 'assets/oysters/pink-moon.jpg',
  'queens-cup': 'assets/oysters/queens-cup.png',
  'rappahannock': 'assets/oysters/rappahannock.jpg',
  'royal-miyagi': 'assets/oysters/royal-miyagi.jpeg',
  'savage-blonde': 'assets/oysters/savage-blonde.jpg',
  'sex-on-the-bay': 'assets/oysters/sex-on-the-bay.png',
  'shigoku': 'assets/oysters/shigoku.jpg',
  'southern-salt': 'assets/oysters/southern-salt.webp',
  'spindrift': 'assets/oysters/spindrift.png',
  'sweet-petite': 'assets/oysters/sweet-petite.avif',
  'ta': 'assets/oysters/ta.png',
  'taylor-virginica': 'assets/oysters/taylor-virginica.jpg',
  'tuxedo': 'assets/oysters/tuxedo.jpg',
  'watch-hill': 'assets/oysters/watch-hill.jpg',
  'wellfleet': 'assets/oysters/wellfleet.webp',
  'white-stone': 'assets/oysters/white-stone.webp',
  'wianno': 'assets/oysters/wianno.jpg'
};
OYSTERS.forEach(o => { if (!o.photoUrl) o.photoUrl = PHOTO_MAP[o.id] || null; });

const DOTS_MAP  = { 'low':1, 'medium':2, 'medium-high':3, 'high':4, 'very-high':5 };

// ── Sort state ────────────────────────────────────────────────────────────────
let currentSort   = 'az';
let lastServingIds = new Set();

const SAL_ORDER  = { 'low':1, 'medium':2, 'medium-high':3, 'high':4, 'very-high':5 };
const SIZE_ORDER = { 'small':1, 'small-medium':2, 'medium':3, 'large':4 };
const SIZE_MAP   = {
  'barstool':'small',      'beach-plum':'medium',    'bear-tide':'large',
  'beau-soleil':'small',   'blackberry':'small-medium','blue-point-ct':'medium',
  'blue-point':'medium',   'boomamoto':'small',       'breakwater':'large',
  'cable-creek':'medium',  'carolina-envy':'small-medium','carolina-gold':'medium',
  'carolina-jade':'small-medium','divine-pines':'medium','divine-pine':'medium',
  'fat-bastard':'large',   'french-kiss':'medium',    'great-white':'large',
  'hammerheads':'large',   'hearts-desire':'medium',  'irish-point':'small-medium',
  'irish-points':'small-medium','james-river':'large','jimmy-fund-gold':'medium',
  'katama':'large',        'katama-ma':'large',       'kumamoto':'small',
  'le-petite-barachois':'small','little-bears':'small-medium','love-shuck':'medium',
  'lovers-river':'medium', 'malpeque':'medium',       'mama-mia':'medium',
  'momma-mia':'medium',    'masonboro-pearl':'medium','mookiemoto':'medium',
  'moondancer':'medium',   'moonrise':'medium',       'nc-ikigai':'medium',
  'olde-salt':'medium',    'olympic-view':'medium',   'pink-moon':'medium',
  'queens-cup':'medium',   'rappahannock':'large',    'red-raider':'medium',
  'royal-miyagi':'medium', 'savage-blonde':'medium',  'sex-on-the-bay':'medium',
  'shigoku':'small-medium','southern-salt':'medium',  'southern-salts':'medium',
  'spindrift':'medium',    'sweet-petite':'small',    'ta':'medium',
  'taylor-virginica':'medium','ts-virginica':'medium','tuxedo':'small',
  'watch-hill':'medium',   'wellfleet':'medium',      'white-stone':'medium',
  'wianno':'medium',       'beausoleil':'small',      'barstool':'small',
  'ct-blue-points':'medium','fat-bellies':'medium'
};

function buildDots(level) {
  const filled = DOTS_MAP[level] || 2;
  return Array.from({length:5}, (_,i) =>
    `<span class="${i < filled ? 'filled' : ''}"></span>`
  ).join('');
}

function render(servingIds) {
  lastServingIds = servingIds;
  const grid       = document.getElementById('card-grid');
  const empty      = document.getElementById('empty-state');
  const countLabel = document.getElementById('count-label');
  const seen = new Set();
  const serving    = OYSTERS.filter(o => servingIds.has(o.id) && !seen.has(o.id) && seen.add(o.id));

  // Apply current sort
  if (currentSort === 'az')       serving.sort((a,b) => a.name.localeCompare(b.name));
  else if (currentSort === 'za')  serving.sort((a,b) => b.name.localeCompare(a.name));
  else if (currentSort === 'salinity') serving.sort((a,b) => (SAL_ORDER[a.salinity]||2) - (SAL_ORDER[b.salinity]||2));
  else if (currentSort === 'size')     serving.sort((a,b) => (SIZE_ORDER[SIZE_MAP[a.id]]||3) - (SIZE_ORDER[SIZE_MAP[b.id]]||3));

  if (serving.length === 0) {
    grid.style.display  = 'none';
    empty.style.display = 'block';
    countLabel.textContent = '';
    return;
  }

  grid.style.display  = '';
  empty.style.display = 'none';
  countLabel.textContent = `${serving.length} variet${serving.length === 1 ? 'y' : 'ies'}`;

  grid.innerHTML = serving.map(o => `
    <div class="oyster-card">
      ${o.photoUrl
        ? `<img class="card-photo" src="${o.photoUrl}" alt="${o.name} oysters on the half shell" loading="lazy" width="300" height="180" onerror="this.outerHTML='<div class=\\'card-photo-placeholder\\'>🦪</div>'">`
        : `<div class="card-photo-placeholder">🦪</div>`}
      <div class="card-head">
        <div class="card-head-text">
          <div class="card-name">${o.name}</div>
          <div class="card-origin">${o.origin}</div>
        </div>
        ${o.price != null ? `<div class="card-price">$${o.price % 1 === 0 ? o.price : o.price.toFixed(2)}</div>` : ''}
      </div>
      <div class="card-salinity">
        <span class="sal-label" data-tip="Salinity is the measure of salt in the water your oyster was grown&#10;&#10;More dots = Saltier oyster">Salinity</span>
        <div class="sal-dots">${buildDots(o.salinity)}</div>
        <span class="sal-text">${(function(t){
          if(!t||t==='TBD')return'';
          t=t.replace(/^(very high|high|moderate to high|medium[- ]to[- ]high|low to moderate|moderate|medium|low)\s*[—–\-]\s*/i,'').replace(/\s*ppt/gi,'').trim();
          if(/^~?[\d.,]+\s*[–\-]?\s*~?[\d.,]*$/.test(t))return'';
          if(/rated\s*[\d.]+\s*\/\s*\d+|[\d.]+\s*[–\/]\s*[\d.]+\s*(\/\s*\d+)?\s*intensity/i.test(t))return'';
          return t;
        })(o.salinityText)}</span>
      </div>
      <div class="card-body">
        <p class="card-tasting">${o.tastingNotes}</p>
        <a class="card-link" href="oyster.html?id=${o.id}">Full profile &rarr;</a>
      </div>
    </div>
  `).join('');
}

  loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js', function () {

      function startListener() {

      // Disconnect realtime listener when page is hidden (allows bfcache),

        } else {

        }
      });
    });
  });
})();

// Salinity tooltip
(function() {
  const tip = document.createElement('div');
  tip.className = 'sal-tooltip';
  document.body.appendChild(tip);

  function show(label) {
    tip.textContent = label.dataset.tip;
    tip.style.display = 'block';
  }
  function position(label) {
    const r = label.getBoundingClientRect();
    let top = r.top - tip.offsetHeight - 8;
    if (top < 8) top = r.bottom + 8;
    let left = r.left;
    if (left + 200 > window.innerWidth - 8) left = window.innerWidth - 208;
    tip.style.top = top + 'px';
    tip.style.left = left + 'px';
  }
  function hide() { tip.style.display = 'none'; }

  // Mouse
  document.addEventListener('mouseover', e => {
    const label = e.target.closest('.sal-label');
    if (label) { show(label); position(label); }
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest('.sal-label')) hide();
  });

  // Touch toggle
  document.addEventListener('touchstart', e => {
    const label = e.target.closest('.sal-label');
    if (label) {
      e.preventDefault();
      if (tip.style.display === 'block') { hide(); return; }
      show(label); position(label);
    } else {
      hide();
    }
  }, { passive: false });
})();

// Sort dropdown
(function() {
  const sortBtn  = document.getElementById('sort-btn');
  const sortDrop = document.getElementById('sort-dropdown');
  if (!sortBtn) return;

  sortBtn.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = sortDrop.classList.toggle('open');
    sortBtn.classList.toggle('active', isOpen);
  });

  document.addEventListener('click', () => {
    sortDrop.classList.remove('open');
    sortBtn.classList.remove('active');
  });

  sortDrop.addEventListener('click', e => {
    const opt = e.target.closest('.sort-option');
    if (!opt) return;
    currentSort = opt.dataset.sort;
    sortDrop.querySelectorAll('.sort-option').forEach(o => o.classList.toggle('active', o === opt));
    sortDrop.classList.remove('open');
    sortBtn.classList.remove('active');
    render(lastServingIds);
  });
})();
