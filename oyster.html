<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Half Shell — Oyster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=Roboto+Mono:wght@400;700&family=Montserrat:ital,wght@0,300;0,400;0,600;1,400&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=Roboto+Mono:wght@400;700&family=Montserrat:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet"></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body { overflow-x: hidden; }

    body {
      font-family: 'Playfair Display', Georgia, serif;
      background: #f3f8f6;
      color: #0e2d3a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #0e2d3a;
      color: #f5f0e8;
      padding: 1.25rem 2.5rem;
      border-bottom: 3px solid #e89438;
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }
    .header-logo {
      height: 48px;
      width: auto;
      flex-shrink: 0;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.4));
    }
    .header-text { flex: 1; }
    .header-text h1 {
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.02em;
    }
    .header-text p {
      font-family: 'Lato', sans-serif;
      font-size: 0.75rem;
      color: #8ab4be;
      margin-top: 0.2rem;
    }

    /* ── Page nav bar ── */
    .page-nav {
      background: #112f3d;
      border-bottom: 1px solid #1a4a5a;
      padding: 0 2rem;
      display: flex;
      align-items: stretch;
    }
    .page-nav a {
      font-family: 'Lato', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #6a8f9a;
      text-decoration: none;
      padding: 0.65rem 1rem;
      border-bottom: 2px solid transparent;
      transition: color 0.15s;
      display: flex;
      align-items: center;
    }
    .page-nav a:hover { color: #f5f0e8; }
    .page-nav a.active { color: #e89438; border-bottom-color: #e89438; }
    .nav-login-link {
      margin-left: auto;
      display: flex;
      align-items: center;
      padding: 0.55rem 0.75rem;
      color: #6a8f9a;
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-login-link:hover { color: #f5f0e8; }

    /* ── Main layout ── */
    main {
      flex: 1;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
      padding: 2.5rem 2rem 3rem;
    }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: 'Lato', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6a8f9a;
      text-decoration: none;
      margin-bottom: 1.75rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: #e89438; }

    /* ── Oyster hero card ── */
    .oyster-hero {
      background: #0e2d3a;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .oyster-photo {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      display: block;
    }
    .oyster-photo-placeholder {
      width: 100%;
      height: 280px;
      background: linear-gradient(135deg, #112f3d 0%, #1a4a5a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2a7f94;
      font-size: 4rem;
    }
    .oyster-hero-body {
      padding: 1.5rem 1.75rem 1.75rem;
    }
    .oyster-hero-name {
      font-family: 'Roboto Mono', monospace;
      font-size: 2rem;
      font-weight: 400;
      color: #f5f0e8;
      margin-bottom: 0.25rem;
      letter-spacing: 0.02em;
    }
    .oyster-hero-origin {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      color: #8ab4be;
      margin-bottom: 1.1rem;
    }

    /* Salinity bar */
    .salinity-row {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .salinity-label-tag {
      font-family: 'Lato', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #e89438;
    }
    .salinity-dots { display: flex; gap: 5px; }
    .salinity-dots span {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
    }
    .salinity-dots span.filled { background: #e89438; }
    .salinity-value-text {
      font-family: 'Lato', sans-serif;
      font-size: 0.8rem;
      color: #a8c8d0;
    }

    /* Tasting notes pull-quote */
    .tasting-quote {
      font-family: 'Montserrat', sans-serif;
      font-style: italic;
      font-size: 1.05rem;
      line-height: 1.65;
      color: #c8dfe5;
      border-left: 3px solid #e89438;
      padding-left: 1rem;
      margin-top: 0.5rem;
    }

    /* ── Details grid ── */
    .details-section {
      margin-bottom: 1.75rem;
    }
    .section-label {
      font-family: 'Lato', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #e89438;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #bcd4ce;
    }
    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem 1.5rem;
    }
    .detail-item {}
    .detail-key {
      font-family: 'Lato', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6a8f9a;
      margin-bottom: 0.15rem;
    }
    .detail-val {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      color: #1a3a45;
      line-height: 1.4;
    }
    .detail-val em { font-style: italic; }

    /* ── Notable callout ── */
    .notable-box {
      background: #e8f2ef;
      border-left: 3px solid #e89438;
      border-radius: 0 4px 4px 0;
      padding: 1rem 1.25rem;
      margin-bottom: 1.75rem;
    }
    .notable-box .section-label { border-bottom: none; margin-bottom: 0.4rem; }
    .notable-box p {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      line-height: 1.65;
      color: #1a3a45;
    }

    /* ── Farmer link ── */
    .farmer-link-wrap {
      margin-top: 0.5rem;
    }
    .farmer-link {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-family: 'Lato', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #f5f0e8;
      background: #2a7f94;
      border: none;
      border-radius: 4px;
      padding: 0.55rem 1.1rem;
      text-decoration: none;
      transition: background 0.15s;
    }
    .farmer-link:hover { background: #1f6070; }
    .farmer-link svg { flex-shrink: 0; }

    /* ── Not found ── */
    .not-found {
      text-align: center;
      padding: 4rem 2rem;
      color: #6a8f9a;
    }
    .not-found h2 { font-size: 1.5rem; font-weight: 400; margin-bottom: 0.5rem; }
    .not-found p { font-style: italic; font-size: 0.9rem; }

    /* ── Footer ── */
    footer {
      background: #0e2d3a;
      border-top: 1px solid #1a4a5a;
      padding: 1rem 2rem;
      text-align: center;
    }
    footer a {
      font-family: 'Lato', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #6a8f9a;
      text-decoration: none;
      transition: color 0.15s;
    }
    footer a:hover { color: #e89438; }
    .sep { color: #1a4a5a; margin: 0 0.75rem; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      /* Header */
      header { padding: 0.75rem 1rem; gap: 0.75rem; }
      .header-logo { height: 32px; }
      .header-text h1 { font-size: 1.05rem; }
      .header-text p { font-size: 0.68rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

      /* Nav */
      .page-nav { padding: 0 0.5rem; }
      .page-nav a { padding: 0.6rem 0.6rem; font-size: 0.6rem; }

      /* Main content */
      main { padding: 1rem 0.85rem 2rem; }

      /* Hero card */
      .oyster-photo { max-height: 240px; }
      .oyster-photo-placeholder { height: 180px; font-size: 3rem; }
      .oyster-hero-body { padding: 1rem 1rem 1.25rem; }
      .oyster-hero-name { font-size: 1.35rem; }
      .oyster-hero-origin { font-size: 0.75rem; }

      /* Salinity row — allow wrap on very small screens */
      .salinity-row { gap: 0.5rem; }
      .salinity-value-text { font-size: 0.75rem; }

      /* Tasting quote */
      .tasting-quote { font-size: 0.92rem; line-height: 1.6; }

      /* Details */
      .details-grid { grid-template-columns: 1fr; gap: 0.5rem; }
      .detail-val { font-size: 0.85rem; }

      /* Notable box */
      .notable-box { padding: 0.85rem 1rem; }
      .notable-box p { font-size: 0.85rem; }

      /* Farmer link */
      .farmer-link { font-size: 0.7rem; padding: 0.5rem 0.9rem; }
    }
  </style>
</head>
<body>

<header>
  <img src="assets/logo.png" alt="Half Shell Raw Bar" class="header-logo" width="52" height="52" />
  <div class="header-text">
    <h1 id="page-title">Oyster Profile</h1>
    <p id="page-subtitle">Half Shell Raw Bar</p>
  </div>
</header>

<nav class="page-nav">
  <a href="index.html">Tonight's Menu</a>
  <a href="Oyster%20Overview.html">Oyster Library</a>
  <a class="nav-login-link" href="User.html" aria-label="Login">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
  </a>
</nav>

<main id="main-content">
  <!-- Populated by JS -->
</main>

<footer>
  <a href="index.html">Tonight's Menu</a>
  <span class="sep">|</span>
  <a href="Oyster%20Overview.html">Oyster Library</a>
  <span class="sep">|</span>
  <a href="employee.html">Employee Portal</a>
</footer>

<script src="./data/oysters.js?v=2"></script>
<script>
const PHOTO_MAP = {
  'barstool': 'assets/oysters/barstool.jpg',
  'beach-plum': 'assets/oysters/beach-plum.webp',
  'bear-tide': 'assets/oysters/bear-tide.jpg',
  'beau-soleil': 'assets/oysters/Beau-soleil.jpg',
  'blackberry': 'assets/oysters/blackberry.webp',
  'blue-point-ct': 'assets/oysters/blue-point-ct.jpg',
  'boomamoto': 'assets/oysters/boomamoto.jpeg',
  'breakwater': 'assets/oysters/breakwater.png',
  'carolina-envy': 'assets/oysters/carolina-envy.png',
  'carolina-gold': 'assets/oysters/carolina-gold.png',
  'divine-pines': 'assets/oysters/divine-pines.png',
  'fat-bastard': 'assets/oysters/fat-bastard.jpg',
  'french-kiss': 'assets/oysters/french-kiss.jpg',
  'great-white': 'assets/oysters/great-white.webp',
  'hammerheads': 'assets/oysters/hammerheads.webp',
  'hearts-desire': 'assets/oysters/hearts-desire.JPG',
  'irish-point': 'assets/oysters/irish-point.webp',
  'james-river': 'assets/oysters/james-river.jpg',
  'jimmy-fund-gold': 'assets/oysters/jimmy-fund-gold.jpg',
  'kumamoto': 'assets/oysters/kumamoto.jpg',
  'le-petite-barachois': 'assets/oysters/le-petite-barachois.jpg',
  'love-shuck': 'assets/oysters/love-shuck.png',
  'malpeque': 'assets/oysters/Malpeque.jpg',
  'mama-mia': 'assets/oysters/mama-mia.jpg',
  'masonboro-pearl': 'assets/oysters/masonboro-pearl.jpg',
  'mookiemoto': 'assets/oysters/mookiemoto.webp',
  'moondancer': 'assets/oysters/moondancer.jpg',
  'moonrise': 'assets/oysters/moonrise.jpg',
  'nc-ikigai': 'assets/oysters/nc-ikigai.png',
  'olde-salt': 'assets/oysters/olde-salt.jpg',
  'olympic-view': 'assets/oysters/olympic-view.png',
  'pink-moon': 'assets/oysters/pink-moon.jpg',
  'queens-cup': 'assets/oysters/queens-cup.png',
  'rappahannock': 'assets/oysters/rappahannock.jpg',
  'royal-miyagi': 'assets/oysters/royal-miyagi.jpeg',
  'savage-blonde': 'assets/oysters/savage-blonde.jpg',
  'sex-on-the-bay': 'assets/oysters/sex-on-the-bay.png',
  'shigoku': 'assets/oysters/shigoku.jpg',
  'southern-salt': 'assets/oysters/southern-salt.webp',
  'spindrift': 'assets/oysters/spindrift.png',
  'sweet-petite': 'assets/oysters/sweet-petite.avif',
  'ta': 'assets/oysters/ta.png',
  'taylor-virginica': 'assets/oysters/taylor-virginica.jpg',
  'tuxedo': 'assets/oysters/tuxedo.jpg',
  'watch-hill': 'assets/oysters/watch-hill.jpg',
  'wellfleet': 'assets/oysters/wellfleet.webp',
  'white-stone': 'assets/oysters/white-stone.webp',
  'wianno': 'assets/oysters/wianno.jpg'
};
OYSTERS.forEach(o => { if (!o.photoUrl) o.photoUrl = PHOTO_MAP[o.id] || null; });

// ── Salinity dots ──────────────────────────────────────────────────────────
const DOTS_MAP = { 'low':1, 'medium':2, 'medium-high':3, 'high':4, 'very-high':5 };
function buildDots(level) {
  const filled = DOTS_MAP[level] || 2;
  return Array.from({length:5}, (_,i) =>
    `<span class="${i < filled ? 'filled' : ''}"></span>`
  ).join('');
}

// ── Render page ────────────────────────────────────────────────────────────
function render() {
  const params = new URLSearchParams(window.location.search);
  const id     = params.get('id');
  const oyster = OYSTERS.find(o => o.id === id);
  const main   = document.getElementById('main-content');

  if (!oyster) {
    main.innerHTML = `
      <div class="not-found">
        <h2>Oyster not found</h2>
        <p>We couldn't find that oyster. Try the <a href="Oyster%20Overview.html" style="color:#e89438">Oyster Library</a>.</p>
      </div>`;
    return;
  }

  // Update page title
  document.title = `Half Shell — ${oyster.name}`;
  document.getElementById('page-title').textContent = oyster.name;
  document.getElementById('page-subtitle').textContent = oyster.origin.split(',').slice(-1)[0].trim();

  // Photo or placeholder
  const photoAlt = oyster.photoAlt || `${oyster.name} oysters on the half shell`;
  const photoEl = oyster.photoUrl
    ? `<img class="oyster-photo" src="${oyster.photoUrl}" alt="${photoAlt}" loading="lazy" width="800" height="400" onerror="this.parentElement.innerHTML='<div class=\'oyster-photo-placeholder\'>🦪</div>'">`
    : `<div class="oyster-photo-placeholder">🦪</div>`;

  // Farmer link
  const farmerName = oyster.farmer || 'TBD';
  const farmerLinkEl = oyster.farmerUrl
    ? `<a class="farmer-link" href="${oyster.farmerUrl}" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 2H2a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1V9"/>
          <polyline points="8,1 13,1 13,6"/>
          <line x1="13" y1="1" x2="6" y2="8"/>
        </svg>
        Visit ${farmerName}
      </a>`
    : `<span style="font-family:'Lato',sans-serif;font-size:0.8rem;color:#6a8f9a;font-style:italic;">${farmerName}</span>`;

  main.innerHTML = `
    <a class="back-link" href="javascript:history.back()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9,2 4,7 9,12"/>
      </svg>
      Back
    </a>

    <div class="oyster-hero">
      ${photoEl}
      <div class="oyster-hero-body">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:0.75rem;">
          <div class="oyster-hero-name" style="flex:1">${oyster.name}</div>
          ${oyster.price != null ? `<div style="font-family:'Lato',sans-serif;font-size:1.1rem;font-weight:700;color:#e89438;white-space:nowrap;padding-top:0.35rem;">$${oyster.price % 1 === 0 ? oyster.price : oyster.price.toFixed(2)}</div>` : ''}
        </div>
        <div class="oyster-hero-origin">${oyster.origin}</div>
        <div class="salinity-row">
          <span class="salinity-label-tag">Salinity</span>
          <div class="salinity-dots">${buildDots(oyster.salinity)}</div>
          <span class="salinity-value-text">${oyster.salinityText}</span>
        </div>
        <blockquote class="tasting-quote">${oyster.tastingNotes}</blockquote>
      </div>
    </div>

    <div class="details-section">
      <div class="section-label">Details</div>
      <div class="details-grid">
        <div class="detail-item"><div class="detail-key">Species</div><div class="detail-val"><em>${oyster.species || 'TBD'}</em></div></div>
        <div class="detail-item"><div class="detail-key">Size</div><div class="detail-val">${oyster.size || 'TBD'}</div></div>
        <div class="detail-item"><div class="detail-key">Farming Method</div><div class="detail-val">${oyster.farmingMethod || 'TBD'}</div></div>
        <div class="detail-item"><div class="detail-key">Grow-Out</div><div class="detail-val">${oyster.growOut || 'TBD'}</div></div>
        <div class="detail-item"><div class="detail-key">Availability</div><div class="detail-val">${oyster.seasonalAvailability || 'TBD'}</div></div>
        <div class="detail-item"><div class="detail-key">Shell</div><div class="detail-val">${oyster.shell || 'TBD'}</div></div>
      </div>
    </div>

    ${oyster.notable ? `
    <div class="notable-box">
      <div class="section-label">Notable</div>
      <p>${oyster.notable}</p>
    </div>` : ''}

    <div class="details-section">
      <div class="section-label">The Farm</div>
      <div class="farmer-link-wrap">${farmerLinkEl}</div>
    </div>
  `;
}

render();

</script>
</body>
</html>
